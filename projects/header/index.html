<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        *{
            padding: 0%;
            margin: 0%;
        }
        .nav-container{
            background-color: #fff;
            padding: 5px 50px;
            display: flex;
            justify-content: space-between;
        }
        .nav-container .nav-logo{
            display: flex;
            cursor: pointer;
        }
        .nav-container .nav-logo h1{
            cursor: pointer;
            color: #8CB7F5;
            margin: 9px;
            font-family: jetbrains mono;
            font-size: 20px;
        }
        .nav-container .nav-search{
            display: flex;
            position: relative;
            height: 2.2rem;
            border: 3px solid #0D6EFD;
            width: 50%;
            margin-top: 5px;
            padding: 0px;
            border-radius: 5px;
        }
        .nav-container .nav-search input{
            outline: none;
            font-size: 15px;
            padding: 5px 10px;
            width: 70%;
            font-family: jetbrains mono;
            border: none;
            border-right: 2px solid #0D6EFD;
        }
        .nav-container .nav-search select{
            cursor: pointer;
            width: 15%;
            font-weight: 400;
            font-family: jetbrains mono;
            font-size: 15px;
            outline: none;
            border: none;
        }
        .nav-container .nav-search button{
            cursor: pointer;
            width: 16%;
            background-color: #127FFF;
            font-weight: 400;
            font-family: jetbrains mono;
            color: white;
            font-size: 15px;
            padding: 0px 30px;
            outline: none;
            border: none;
        }
        .nav-container .nav-icons{
            margin-top: 10px;
            display: flex;
        }
        .nav-container .nav-icons img{
            cursor: pointer;

            margin-left: 10px;
            height: 30px;
            width: 30px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <nav class="nav-container">
        <div class="nav-logo">
            <img src="images/shopping-bag.png" alt="" srcset="" height="40" width="40">
            <h1>shoppee</h1>
        </div>
        <div class="nav-search">
            <input type="search" name="" id="">
            <select name="" id="" >
                <option value="" selected>All type</option>
                <option value="">india</option>
                <option value="">canada</option>
            </select>
            <button> search</button>
        </div>
        <div class="nav-icons">
            <img src="images/user.png" alt="" >
            <img src="images/love.png" alt="">
            <img src="images/chat.png" alt="">
            <img src="images/shopping-cart.png" alt="">
        </div>
    </nav>
</body>
</html>
